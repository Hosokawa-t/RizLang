name: CI

on:
  push:
    branches: [main, release]
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Riz
        run: |
          gcc -Wall -Wextra -std=c11 -O2 -Isrc -o riz \
            src/diagnostic.c src/main.c src/lexer.c src/parser.c src/ast.c \
            src/interpreter.c src/value.c src/environment.c \
            src/chunk.c src/compiler.c src/vm.c src/codegen.c \
            src/riz_env.c src/riz_import.c src/pkg.c -lm

      - name: Smoke — interpreter
        run: ./riz examples/hello.riz

      - name: Smoke — interpreter (shutdown + struct)
        run: ./riz examples/interpreter_smoke.riz

      - name: Smoke — VM
        run: ./riz --vm examples/vm_test.riz

      - name: Smoke — VM import
        run: ./riz --vm examples/vm_import_client.riz

      - name: Parse-check all examples (riz check)
        run: bash tools/check_examples.sh

      - name: Build llama bridge plugin (.so)
        run: gcc -shared -O2 -Wall -Wextra -Isrc -o plugin_llama_cli.so examples/plugin_llama_cli.c

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Riz LSP (TypeScript)
        working-directory: lsp
        run: npm ci && npm run build

      - name: Package Riz VS Code extension (VSIX)
        working-directory: editors/riz-vscode
        run: npm ci && npx --yes @vscode/vsce package --no-dependencies

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: riz-vscode-vsix
          path: editors/riz-vscode/*.vsix
          if-no-files-found: error
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc

      - name: Build and smoke-test Riz (MinGW)
        shell: msys2 {0}
        run: |
          set -e
          gcc -Wall -Wextra -std=c11 -O2 -Isrc -o riz.exe \
            src/diagnostic.c src/main.c src/lexer.c src/parser.c src/ast.c \
            src/interpreter.c src/value.c src/environment.c \
            src/chunk.c src/compiler.c src/vm.c src/codegen.c \
            src/riz_env.c src/riz_import.c src/pkg.c -lm
          ./riz.exe examples/hello.riz
          ./riz.exe examples/interpreter_smoke.riz
          ./riz.exe --vm examples/vm_test.riz
          ./riz.exe --vm examples/vm_import_client.riz
          bash tools/check_examples.sh

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Package Windows release zip
        shell: pwsh
        run: |
          pwsh -NoProfile -File tools/package_windows_release.ps1 `
            -RepoRoot "${{ github.workspace }}" `
            -RizExe "${{ github.workspace }}/riz.exe" `
            -OutDir "${{ github.workspace }}"

      - name: Upload Windows x64 zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: riz-windows-x64-zip
          path: riz-v*-windows-x64.zip
          if-no-files-found: error
          retention-days: 90
